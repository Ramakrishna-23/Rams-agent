<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rams Agent - Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="card">
    <h1>Rams Agent Settings</h1>
    <p class="subtitle">Configure your backend connection and preferences.</p>

    <div class="field">
      <label for="apiUrl">Backend URL <span class="hint">e.g. http://localhost:8000</span></label>
      <input type="text" id="apiUrl" placeholder="http://localhost:8000" />
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Enter your API key" />
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <button id="resetBtn" class="btn-secondary">Reset</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
